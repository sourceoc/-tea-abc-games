<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Especial - Jogos de Alfabetização</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">🌟 ABC Especial 🌟</h1>
            <p class="subtitle">Aprendendo com diversão!</p>
        </header>

        <!-- Menu de usuário -->
        <div class="user-menu" id="userMenu">
            <div class="user-profile" id="userProfile">
                <div class="avatar" id="userAvatar">👤</div>
                <div class="user-info">
                    <div class="username" id="username">Visitante</div>
                    <div class="user-level" id="userLevel">Nível 1</div>
                </div>
                <button class="sound-btn" onclick="toggleSound()" id="soundBtn" title="Ativar/Desativar Som">🔊</button>
                <button class="settings-btn" onclick="playClickSound(); showSettings()" onmouseover="playHoverSound()">⚙️</button>
            </div>
        </div>

        <!-- Menu de configurações -->
        <div class="settings-panel" id="settingsPanel" style="display: none;">
            <h3>⚙️ Configurações</h3>
            <div class="settings-group">
                <label>👤 Nome do Jogador:</label>
                <input type="text" id="playerName" placeholder="Digite seu nome">
                <button onclick="playClickSound(); saveProfile()" onmouseover="playHoverSound()">Salvar</button>
            </div>
            <div class="settings-group">
                <label>🎯 Dificuldade:</label>
                <select id="difficultySelect" onchange="playClickSound(); changeDifficulty()" onmouseover="playHoverSound()">
                    <option value="easy">😊 Fácil</option>
                    <option value="medium">😐 Médio</option>
                    <option value="hard">😤 Difícil</option>
                </select>
            </div>
            <div class="settings-group">
                <label>🎨 Tema:</label>
                <select id="themeSelect" onchange="playClickSound(); changeTheme()" onmouseover="playHoverSound()">
                    <option value="default">🌈 Padrão</option>
                    <option value="ocean">🌊 Oceano</option>
                    <option value="space">🚀 Espaço</option>
                    <option value="forest">🌲 Floresta</option>
                    <option value="rainbow">🦄 Arco-íris</option>
                </select>
            </div>
            <button class="close-btn" onclick="playClickSound(); hideSettings()" onmouseover="playHoverSound()">Fechar</button>
        </div>

        <nav class="game-menu">
            <button class="game-btn" id="lettersGame" onclick="playClickSound(); startGame('letters')" onmouseover="playHoverSound()">
                <div class="game-icon">🔤</div>
                <div class="game-title">Reconhecer Letras</div>
                <div class="game-progress" id="lettersProgress">0/38</div>
            </button>
            
            <button class="game-btn" id="wordsGame" onclick="playClickSound(); startGame('words')" onmouseover="playHoverSound()">
                <div class="game-icon">🔤</div>
                <div class="game-title">Formar Palavras</div>
                <div class="game-progress" id="wordsProgress">0/24</div>
            </button>
            
            <button class="game-btn" id="matchGame" onclick="playClickSound(); startGame('match')" onmouseover="playHoverSound()">
                <div class="game-icon">🖼️</div>
                <div class="game-title">Palavra e Imagem</div>
                <div class="game-progress" id="matchProgress">0/41</div>
            </button>
        </nav>

        <div class="progress-container">
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-value" id="scoreDisplay">0</div>
                    <div class="stat-label">Pontos</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value" id="streakDisplay">0</div>
                    <div class="stat-label">Sequência</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">❤️</div>
                    <div class="stat-value" id="livesDisplay">3</div>
                    <div class="stat-label">Vidas</div>
                </div>
                <div class="stat-item" id="timerDisplay" style="display: none;">
                    <div class="stat-icon">⏰</div>
                    <div class="stat-value" id="timeValue">30</div>
                    <div class="stat-label">Tempo</div>
                </div>
            </div>
            <div class="progress-label">Progresso do Jogo:</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="achievements-bar" id="achievementsBar"></div>
        </div>

        <main class="game-area" id="gameArea">
            <div class="welcome-message">
                <h2>Bem-vindo ao ABC Especial!</h2>
                <p>Escolha um jogo para começar a aprender!</p>
                <div class="welcome-emoji">😊</div>
            </div>
        </main>

        <div class="controls">
            <button class="control-btn" id="backBtn" onclick="playClickSound(); goBack()" onmouseover="playHoverSound()" style="display: none;">
                ← Voltar
            </button>
            <button class="control-btn special" id="hintBtn" onclick="playClickSound(); showHint()" onmouseover="playHoverSound()" style="display: none;">
                💡 Dica
            </button>
            <button class="control-btn warning" id="skipBtn" onclick="playClickSound(); skipQuestion()" onmouseover="playHoverSound()" style="display: none;">
                ⏭️ Pular
            </button>
            <button class="control-btn success" id="nextBtn" onclick="playClickSound(); nextLevel()" onmouseover="playHoverSound()" style="display: none;">
                Próximo →
            </button>
        </div>

        <!-- Modal de conquistas -->
        <div class="achievement-modal" id="achievementModal" style="display: none;">
            <div class="achievement-content">
                <div class="achievement-icon" id="achievementIcon">🏆</div>
                <h3 id="achievementTitle">Nova Conquista!</h3>
                <p id="achievementDesc">Você desbloqueou uma nova conquista!</p>
                <button onclick="playClickSound(); closeAchievement()" onmouseover="playHoverSound()">Continuar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
